<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | FoodFrame</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a202c 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 20px 0;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }

        .bg-circle:nth-child(1) {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #f5c453, #ff6b6b);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-circle:nth-child(2) {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #4ecdc4, #667eea);
            bottom: -50px;
            right: -50px;
            animation-delay: 2s;
        }

        .bg-circle:nth-child(3) {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #ff6b6b, #764ba2);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(245, 196, 83, 0.5);
            border-radius: 50%;
            animation: particleFloat 10s ease-in-out infinite;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; top: 80%; animation-delay: 1s; background: rgba(255, 107, 107, 0.5); }
        .particle:nth-child(3) { left: 30%; top: 40%; animation-delay: 2s; background: rgba(78, 205, 196, 0.5); }
        .particle:nth-child(4) { left: 50%; top: 60%; animation-delay: 3s; }
        .particle:nth-child(5) { left: 70%; top: 30%; animation-delay: 4s; background: rgba(102, 126, 234, 0.5); }
        .particle:nth-child(6) { left: 80%; top: 70%; animation-delay: 5s; background: rgba(255, 107, 107, 0.5); }
        .particle:nth-child(7) { left: 90%; top: 50%; animation-delay: 6s; background: rgba(78, 205, 196, 0.5); }
        .particle:nth-child(8) { left: 15%; top: 90%; animation-delay: 7s; }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
            50% { transform: translateY(-50px) rotate(180deg); opacity: 1; }
        }

        /* Main Container */
        .container {
            text-align: center;
            z-index: 10;
            position: relative;
            padding: 40px 20px 60px;
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }

        /* 404 Number */
        .error-code {
            font-size: clamp(120px, 25vw, 200px);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(135deg, #f5c453 0%, #ff6b6b 50%, #4ecdc4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glitch 3s ease-in-out infinite;
            text-shadow: none;
        }

        .error-code::before,
        .error-code::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #f5c453 0%, #ff6b6b 50%, #4ecdc4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .error-code::before {
            animation: glitchTop 2s ease-in-out infinite;
            clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
        }

        .error-code::after {
            animation: glitchBottom 3s ease-in-out infinite;
            clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);
        }

        @keyframes glitch {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-2px); }
            40% { transform: translateX(2px); }
            60% { transform: translateX(-1px); }
            80% { transform: translateX(1px); }
        }

        @keyframes glitchTop {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(3px); }
        }

        @keyframes glitchBottom {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-3px); }
        }

        /* Food Icons */
        .food-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .food-icon {
            font-size: 40px;
            animation: bounce 2s ease-in-out infinite;
        }

        .food-icon:nth-child(1) { animation-delay: 0s; }
        .food-icon:nth-child(2) { animation-delay: 0.2s; }
        .food-icon:nth-child(3) { animation-delay: 0.4s; }
        .food-icon:nth-child(4) { animation-delay: 0.6s; }
        .food-icon:nth-child(5) { animation-delay: 0.8s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Message */
        .error-title {
            font-size: clamp(24px, 5vw, 36px);
            font-weight: 700;
            margin-bottom: 16px;
            color: #fff;
        }

        .error-message {
            font-size: clamp(16px, 3vw, 18px);
            color: #8b949e;
            margin-bottom: 40px;
            line-height: 1.7;
        }

        .error-message span {
            color: #f5c453;
            font-weight: 600;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f5c453, #e8b13d);
            color: #1a1a1a;
            box-shadow: 0 10px 40px rgba(245, 196, 83, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(245, 196, 83, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(245, 196, 83, 0.5);
            transform: translateY(-4px);
        }

        /* Host Section */
        .host-section {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 36px;
            border: 2px solid rgba(245, 196, 83, 0.3);
            max-width: 500px;
            margin: 0 auto 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3),
                        0 0 40px rgba(245, 196, 83, 0.1);
        }

        .host-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f5c453, #ff6b6b, #4ecdc4);
        }

        .host-label {
            font-size: 14px;
            font-weight: 700;
            color: #f5c453;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 24px;
        }

        .host-profile {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .host-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid transparent;
            background: linear-gradient(135deg, #f5c453, #ff6b6b, #4ecdc4) padding-box,
                        linear-gradient(135deg, #f5c453, #ff6b6b, #4ecdc4) border-box;
            padding: 3px;
            position: relative;
            flex-shrink: 0;
        }

        .host-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            transition: transform 0.4s ease;
        }

        .host-avatar:hover img {
            transform: scale(1.1);
        }

        .host-avatar::after {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5c453, #ff6b6b, #4ecdc4);
            z-index: -1;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .host-info {
            text-align: left;
        }

        .host-name {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin: 0 0 6px 0;
            background: linear-gradient(135deg, #fff, #f5c453);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .verified-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background: #1877F2;
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
        }
        
        .verified-badge svg {
            width: 12px;
            height: 12px;
            fill: white;
        }

        .host-role {
            font-size: 16px;
            color: #4ecdc4;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .host-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: linear-gradient(135deg, rgba(78, 205, 196, 0.2), rgba(102, 126, 234, 0.2));
            border-radius: 20px;
            font-size: 12px;
            color: #4ecdc4;
            font-weight: 600;
        }

        .host-badge svg {
            width: 14px;
            height: 14px;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: #6e7681;
            font-size: 14px;
            z-index: 10;
        }

        .footer a {
            color: #f5c453;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 30px 16px;
            }

            .food-icon {
                font-size: 30px;
            }

            .btn-group {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 280px;
                justify-content: center;
            }

            .host-section {
                padding: 24px 16px;
                margin: 0 auto 30px;
                max-width: 100%;
                border-radius: 20px;
            }

            .host-profile {
                flex-direction: column;
                text-align: center;
                gap: 16px;
            }

            .host-avatar {
                width: 90px;
                height: 90px;
                margin: 0 auto;
            }

            .host-info {
                text-align: center;
            }
            
            .host-name {
                font-size: 20px;
            }
            
            .host-role {
                font-size: 14px;
            }
            
            .host-label {
                font-size: 12px;
                letter-spacing: 2px;
                margin-bottom: 16px;
            }
            
            .host-badge {
                font-size: 11px;
                padding: 5px 10px;
            }
            
            .footer {
                position: relative;
                margin-top: 30px;
                padding: 20px;
            }
        }
        
        /* Extra small screens */
        @media (max-width: 400px) {
            .error-code {
                font-size: 100px;
            }
            
            .error-title {
                font-size: 20px;
            }
            
            .error-message {
                font-size: 14px;
            }
            
            .food-icons {
                gap: 12px;
            }
            
            .food-icon {
                font-size: 24px;
            }
            
            .host-section {
                padding: 20px 14px;
            }
            
            .host-avatar {
                width: 80px;
                height: 80px;
            }
            
            .host-name {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>

    <!-- Floating Particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Food Icons -->
        <div class="food-icons">
            <span class="food-icon">🍕</span>
            <span class="food-icon">🍔</span>
            <span class="food-icon">🍜</span>
            <span class="food-icon">🍰</span>
            <span class="food-icon">🥤</span>
        </div>

        <!-- 404 Error -->
        <div class="error-code">404</div>

        <h1 class="error-title">Oops! Page Not Found</h1>
        <p class="error-message">
            Looks like this page went out for a <span>food break</span> and never came back! 
            Don't worry, we have plenty of delicious options waiting for you.
        </p>

        <!-- Host Section -->
        <div class="host-section">
            <div class="host-label">🌐 HOSTED BY</div>
            <div class="host-profile">
                <div class="host-avatar">
                    <img src="21.png" alt="Mishon Das Arnab">
                </div>
                <div class="host-info">
                    <h2 class="host-name">
                        Mishon Das Arnab
                        <span class="verified-badge">
                            <svg viewBox="0 0 24 24">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                            </svg>
                        </span>
                    </h2>
                    <div class="host-role">Lead Developer & Host</div>
                    <div class="host-badge">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                        </svg>
                        Verified Host
                    </div>
                </div>
            </div>
        </div>

        <!-- Buttons -->
        <div class="btn-group">
            <a href="page.html" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                Back to Home
            </a>
            <a href="#best-selling-products" class="btn btn-secondary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8.1 13.34l2.83-2.83L3.91 3.5a4.008 4.008 0 000 5.66l4.19 4.18zm6.78-1.81c1.53.71 3.68.21 5.27-1.38 1.91-1.91 2.28-4.65.81-6.12-1.46-1.46-4.2-1.1-6.12.81-1.59 1.59-2.09 3.74-1.38 5.27L3.7 19.87l1.41 1.41L12 14.41l6.88 6.88 1.41-1.41L13.41 13l1.47-1.47z"/>
                </svg>
                Explore Menu
            </a>
        </div>
    </div>

    
</body>
</html>
