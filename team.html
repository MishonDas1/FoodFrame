<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Members</title>

<style>
*{box-sizing:border-box}
body{
 margin:0;
 background:#f4f4f4;
 font-family:"Times New Roman",serif;
}
.header{
 text-align:center;
 padding:30px 0;
 font-size:36px;
 font-weight:bold;
}
.container{
 max-width:1100px;
 margin:auto;
}
.grid{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:40px;
 margin-bottom:50px;
}
.center-top{
 display:flex;
 justify-content:center;
 margin-bottom:40px;
}
.card{
 background:#fff;
 border-radius:18px;
 padding:15px;
 text-align:center;
 cursor:pointer;
 box-shadow:0 10px 25px rgba(0,0,0,.15);
 transition:.3s;
}
.card:hover{transform:translateY(-8px)}
.card img{
 width:100%;
 height:240px;
 border-radius:16px;
 object-fit:cover;
 object-position:top;
}
.name{
 display:block;
 margin-top:12px;
 font-size:22px;
 color:#8b0000;
 font-weight:bold;
 text-decoration:none;
 transition:color .3s ease;
}
.name:hover{
 color:#d5402b;
 text-decoration:underline;
}
.role{font-size:18px}
.details{
 max-width:900px;
 margin:0 auto 60px;
 background:#111;
 color:#fff;
 border-radius:20px;
 padding:25px;
 display:none;
}
.details h2{margin-top:0;color:#92ff1e}
</style>
</head>

<body>

<div class="header">Team Members</div>

<div class="container">

<!-- TOP CENTER -->
<div class="center-top">
 <div class="card" onclick="show('mishon')" style="width:320px">
  <img src="https://i.postimg.cc/tg4hgrqN/mision.jpg">
  <a href="Mishon.html" class="name">Mishon Das Arnab</a>
  <div class="role">Web Developer / UI/UX Designer</div>
 </div>
</div>

<!-- ROW 1 -->
<div class="grid">
 <div class="card" onclick="show('azim')">
  <img src="https://i.postimg.cc/R0gqNX3m/azim.jpg">
  <a href="azim.html" class="name">Faujul Azim</a>
  <div class="role">Web Developer</div>
 </div>

 <div class="card" onclick="show('sakib')">
  <img src="https://i.postimg.cc/g2r9qsrm/jimm.jpg">
  <a href="sakib.html" class="name">Sakibul Hasan</a>
  <div class="role">Web Developer</div>
 </div>

 <div class="card" onclick="show('shoumik')">
  <img src="https://i.postimg.cc/VLCLBzhZ/489831175-2732799363774441-823824760185922779-n.jpg">
  <a href="shoumik.html" class="name">Mahmudul Hasan Shoumik</a>
  <div class="role">Web Developer</div>
 </div>
</div>

<!-- ROW 2 -->
<div class="grid">
 <div class="card" onclick="show('jisan')">
  <img src="https://i.postimg.cc/jdv2jRDr/image-2025-12-16-081300368.png">
  <a href="jisan.html" class="name">Fahriaz Jisan</a>
  <div class="role">Web Developer</div>
 </div>

 <div class="card" onclick="show('farzana')">
  <img src="https://i.postimg.cc/hjbg30xh/farzana.jpg">
  <a href="farzana.html" class="name">Farzana Chowdhury</a>
  <div class="role">Web Developer</div>
 </div>

 <div class="card" onclick="show('lima')">
  <img src="https://i.postimg.cc/W3sxtcFz/lima.jpg">
  <a href="lima.html" class="name">Lima Jahan</a>
  <div class="role">Web Developer</div>
 </div>
</div>

<div id="details" class="details"></div>

</div>

<script>
const data={
 mishon:{name:"Mishon Das Arnab",text:"Lead UI/UX Designer and Web Developer with strong creative and programming background."},
 azim:{name:"Faujul Azim",text:"Web Developer focusing on clean and efficient code."},
 sakib:{name:"Sakibul Hasan",text:"Web Developer and project contributor."},
 shoumik:{name:"Mahmudul Hasan Shoumik",text:"Frontend-focused developer and team contributor."},
 jisan:{name:"Fahriaz Jisan",text:"Web Developer with interest in UI and performance."},
 farzana:{name:"Farzana Chowdhury",text:"Web Developer and creative problem solver."},
 lima:{name:"Lima Jahan",text:"Web Developer with clean design sense."}
};
function show(id){
 const d=document.getElementById('details');
 d.innerHTML=<h2>${data[id].name}</h2><p>${data[id].text}</p>;
 d.style.display='block';
 d.scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
